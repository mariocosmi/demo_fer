<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, initial-scale=1.0">
  <title>Validatrice FER</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Layout IDLE -->
  <div id="area-logo">
    <img src="logoFER.svg" alt="FER">
  </div>

  <div id="area-orologio">
    <span id="orologio-data"></span>
    <span id="orologio-ora"></span>
  </div>

  <div id="area-istruzione">
    <p>Validare il titolo di viaggio</p>
  </div>

  <!-- Popup di successo (QR e NFC) -->
  <div id="popup-successo" class="popup nascosto">
    <p class="popup-testo">Biglietto valido, buon viaggio!</p>
  </div>

  <!-- Popup di attesa (NFC in corso) -->
  <div id="popup-attesa" class="popup nascosto">
    <p class="popup-testo">Attendere prego...</p>
  </div>

  <!-- Indicatore stato connessione -->
  <div id="indicatore-connessione" class="disconnected">
    <svg class="icona-wifi" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
      <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <circle cx="12" cy="20" r="1.2" fill="currentColor" stroke="none"/>
    </svg>
    <!-- etichetta nascosta visivamente ma leggibile dai test -->
    <span class="etichetta">Disconnesso</span>
  </div>

  <script src="js/logger.js"></script>
  <script src="js/mqtt.min.js"></script>
  <script src="config.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
